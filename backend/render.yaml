services:
  - type: web
    name: aurum-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Paste in Render dashboard — never in code
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: SESSION_FREE_LIMIT
        value: "3"
      - key: PYTHON_VERSION
        value: "3.11.0"
